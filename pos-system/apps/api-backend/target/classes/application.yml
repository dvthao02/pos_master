server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/iOrderMaster?currentSchema=platform
    username: vanthao
    password: 123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration/platform
    default-schema: platform
    schemas: platform
    baseline-on-migrate: true

app:
  multitenancy:
    default-schema: platform
  security:
    jwt:
      issuer: iorder-api
      secret: iorder-local-dev-secret-key-change-this-please-2026
      platform-token-minutes: 120
      tenant-token-minutes: 480
